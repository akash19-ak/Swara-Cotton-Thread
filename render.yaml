services:
  - type: web
    name: swara-cotton-thread-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: ./public/uploads
      - key: UPLOAD_PUBLIC_BASE_URL
        value: /uploads
